# Конфигурация админ-панели Pages CMS (app.pagescms.org)
media:
  input: .
  output: /

content:
  - name: maket
    label: "Макеты — фотографии"
    type: file
    path: maket.json
    fields:
      - name: photos
        label: "Фотографии макетов"
        type: image
        list: true

  - name: landshaft
    label: "Ландшафт — фотографии"
    type: file
    path: landshaft.json
    fields:
      - name: photos
        label: "Фотографии"
        type: image
        list: true

  - name: roliki
    label: "Ролики — видео и превью"
    type: file
    path: roliki.json
    fields:
      - name: videos
        label: "Ссылки на YouTube (по одной)"
        type: string
        list: true
      - name: photos
        label: "Фото-превью (необязательно)"
        type: image
        list: true

  - name: materialy
    label: "Материалы — фотографии"
    type: file
    path: materialy.json
    fields:
      - name: photos
        label: "Фотографии"
        type: image
        list: true
