# Конфигурация админ-панели Pages CMS (app.pagescms.org)
media:
  input: images
  output: /images

content:
  - name: maket
    label: "Макеты — фотографии"
    type: file
    path: content/maket.json
    fields:
      - name: photos
        label: "Фотографии макетов"
        type: image
        list: true

  - name: landshaft
    label: "Ландшафт — фотографии"
    type: file
    path: content/landshaft.json
    fields:
      - name: photos
        label: "Фотографии"
        type: image
        list: true

  - name: roliki
    label: "Ролики — видео и превью"
    type: file
    path: content/roliki.json
    fields:
      - name: videos
        label: "Ссылки на YouTube (по одной)"
        type: string
        list: true
      - name: photos
        label: "Фото-превью (необязательно)"
        type: image
        list: true

  - name: materialy
    label: "Материалы — фотографии"
    type: file
    path: content/materialy.json
    fields:
      - name: photos
        label: "Фотографии"
        type: image
        list: true
