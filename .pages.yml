# Конфигурация админ-панели Pages CMS (app.pagescms.org)
media:
  input: media
  output: /media

content:
  - name: portfolio
    label: "Портфолио — проекты"
    type: file
    path: portfolio.json
    fields:
      - name: projects
        label: "Проекты"
        type: object
        list: true
        fields:
          - name: name
            label: "Название проекта"
            type: string
          - name: description
            label: "Короткое описание"
            type: text
          - name: cover
            label: "Обложка (главное фото)"
            type: image
          - name: photos
            label: "Фотографии проекта"
            type: image
            list: true
          - name: videos
            label: "Видео с YouTube (ссылки, необязательно)"
            type: string
            list: true
